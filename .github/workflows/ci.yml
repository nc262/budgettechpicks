name: Build & Verify

# Runs on every push (including the nightly automated data commits) and PRs.
# Cloudflare keeps the last good deploy live if a build fails — this surfaces the
# failure loudly (GitHub status + email) so a bad commit doesn't silently freeze the site.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build (static export)
        run: npm run build
      - name: Verify build output
        run: node scripts/verify-site.mjs
