[build]
  command = "npm run build"
  publish = ".next"

# Environment variables (public — safe to commit, exposed to browser anyway)
[build.environment]
  NEXT_PUBLIC_ADSENSE_ID = "ca-pub-4358249929867424"
  NEXT_PUBLIC_AMAZON_TAG = "totaltechpicks-20"
  NEXT_PUBLIC_GA_ID = ""
  NODE_VERSION = "20"

# Redirect www -> apex domain
[[redirects]]
  from = "https://www.totaltechpicks.com/*"
  to = "https://totaltechpicks.com/:splat"
  status = 301
  force = true

# SPA fallback (handled by Next.js plugin, but belt-and-suspenders)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"
